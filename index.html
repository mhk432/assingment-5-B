


<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <style>
    .tab-active { background-color:  #4A00FF !important; color: white !important; }
    .tab[data-tab="open"].tab-active { background-color: #16a34a !important; }
    .tab[data-tab="closed"].tab-active { background-color: #ef4444 !important; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen my-10">

  <!-- Login Section -->
  <div id="loginSection" class="flex items-center justify-center min-h-screen">
    <div class="card bg-white shadow-2xl p-10 rounded-xl w-full max-w-md">
      <div class="text-center mb-8">
        <img src="./assets/github-logo.png" alt="Logo" class="mx-auto mb-4">
        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>
      <form id="loginForm">
        <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-1" required />
        <p class="mb-6 text-[#4A00FF]">Default: admin</p>
        <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-1" required />
        <p class="mb-6 text-[#4A00FF]">Default: admin123</p>
        <button type="submit" class="btn btn-primary w-full mb-6">Sign In</button>
      </form>
      
      <div class="mx-auto text-center">
        <p class="my-5">Demo Credentials:</p>
        <div class="bg-slate-100 rounded-md px-28 py-4">
            <p> <span class="font-bold">Username: </span>admin</p>
            <p><span class="font-bold"> Password:</span>admin123</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden ">

    <!-- Navbar -->
    <nav class="navbar bg-white shadow sticky top-0 z-10 px-20">
      <div class="flex-1 ">
        <img class="w-8" src="./assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
      </div>
      <div class="flex-none gap-2 ">
        <input id="searchInput" type="text" placeholder="Search issues..." 
        class="input input-bordered" />

        
        <button id="searchBtn" class=" rounded-md px-2 py-2  bg-[#4A00FF] text-white">
          + New Issue
        </button>
      </div>
    </nav>

    <!-- Tabs -->
    <div class="border-b border-gray-200 ">
      <div class="max-w-6xl mx-auto px-6 mt-10 mb-3">
        <div class="px-6 py-6   bg-white tabs-boxed bg-transparent border-none justify-start">
          <button class="tab btn tab-active" data-tab="all">All</button>
          <button class="tab btn " data-tab="open">Open</button>
          <button class="tab btn" data-tab="closed">Closed</button>
        </div>
      </div>
    </div>
    
    <!-- Header with count and dots -->
    <div class="max-w-6xl mx-auto px-4 py-6 border-b border-gray-200">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-slate-300 rounded-full flex items-center justify-center"><img src="./assets/Aperture.png" alt=""></div>
          <div>
            <h2 id="issueCountText" class="text-2xl font-bold">0 Issues</h2>
            <p class="text-gray-600">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-6 text-sm">
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 bg-green-500 rounded-full"></span>
            <span id="openCountText"> Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 bg-purple-500 rounded-full"></span>
            <span id="closedCountText"> Closed</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden flex justify-center items-center py-20">
      <span class="loading loading-spinner loading-lg text-purple-600"></span>
    </div>

    <!-- Issues Grid -->
    <div id="issuesGrid" class="shadow shadow-stone-700 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-4 max-w-6xl mx-auto"></div>

    <!-- Modal - screenshot এর মতো exact design -->
    <dialog id="issueModal" class="modal">
      <div class="modal-box max-w-3xl bg-white rounded-xl shadow-2xl p-0 overflow-hidden">
        <!-- Title + Status + Author + Date + Labels -->
        <div class="p-6 pb-4 border-b border-gray-200">
          <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 mb-3"></h3>
          
          <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm">
            <span id="modalStatus" class="badge badge-success px-4 py-1.5 text-white font-medium rounded-full"></span>
            <span class="text-gray-600">
              • Opened by <span id="modalAuthor" class="font-medium text-gray-800 "></span>
            </span>
            <span id="modalCreated" class="text-gray-500 " ></span>
          </div>

          <div id="modalLabelsContainer" class="flex flex-wrap gap-2 mt-4">
            
          </div>
        </div>

        <!-- Description -->
        <div class="p-6 border-b border-gray-200">
          <p id="modalDesc" class="text-gray-700 leading-relaxed whitespace-pre-wrap"></p>
        </div>

        <!-- Assignee + Priority + Close -->
        <div class="p-6 bg-gray-50 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-6">
          <div class="grid grid-cols-2 gap-6 w-full sm:w-auto">
            <div>
              <p class="text-sm font-medium text-gray-600 mb-1">Assignee:</p>
              <p id="modalAssignee" class="font-medium text-gray-900"></p>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-600 mb-1">Priority:</p>
              <span id="modalPriority" class="inline-block px-5 py-1.5 rounded-full text-sm font-bold text-white"></span>
            </div>
          </div>

          <button class=" bg-[#4A00FF] text-white px-5 py-3 rounded-md"
           onclick="issueModal.close()">
            Close
          </button>
        </div>
      </div>
    </dialog>
  </div>

  <script src="script.js"></script>
</body>
</html>
