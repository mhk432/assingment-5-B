<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <style>
    .tab-active { background-color: #7c3aed !important; color: white !important; } /* purple for All */
    .tab[data-tab="open"].tab-active { background-color: #16a34a !important; } /* green for Open */
    .tab[data-tab="closed"].tab-active { background-color: #a855f7 !important; } /* purple for Closed */
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Login Section -->
  <div id="loginSection" class="flex items-center justify-center min-h-screen">
    <div class="card bg-white shadow-2xl p-10 rounded-xl w-full max-w-md">
      <div class="text-center mb-8">
        <img src="./assets/github-logo.png" alt="Logo" class="mx-auto mb-4">
        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-500">Track and manage lab issues</p>
      </div>
      <form id="loginForm">
        <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-4" required />
        <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-6" required />
        <button type="submit" class="btn btn-primary w-full">Sign In</button>
      </form>
      <p class="text-center mt-4 text-sm text-gray-600">
        Demo: admin / admin123
      </p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden">

    <!-- Navbar -->
    <nav class="navbar bg-white shadow sticky top-0 z-10 px-20">
      <div class="flex-1">
        <img class="w-8" src="./assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
      </div>
      <div class="flex-none gap-2 ">
        <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered" />
        <button id="searchBtn" class="btn btn-square bg-blue-400  text-white">
          <svg class="h-6 w-6 " fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
      </div>
    </nav>

    <!-- Tabs -->
    <div class="border-b border-gray-200">
      <div class="max-w-6xl mx-auto px-4">
        <div class="tabs tabs-boxed bg-transparent border-none justify-start">
          <button class="tab tab-active" data-tab="all">All</button>
          <button class="tab" data-tab="open">Open</button>
          <button class="tab" data-tab="closed">Closed</button>
        </div>
      </div>
    </div>

    <!-- Header with count and dots -->
    <div class="max-w-6xl mx-auto px-4 py-6 border-b border-gray-200">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 text-2xl">
            ⚡
          </div>
          <div>
            <h2 id="issueCountText" class="text-2xl font-bold">0 Issues</h2>
            <p class="text-gray-600">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-6 text-sm">
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 bg-green-500 rounded-full"></span>
            <span id="openCountText">0 Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 bg-purple-500 rounded-full"></span>
            <span id="closedCountText">0 Closed</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden flex justify-center items-center py-20">
      <span class="loading loading-spinner loading-lg text-purple-600"></span>
    </div>

    <!-- Issues Grid -->
    <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-4 max-w-6xl mx-auto"></div>

    <!-- Modal -->
    <dialog id="issueModal" class="modal">
      <div class="modal-box">
        <h3 id="modalTitle" class="font-bold text-lg"></h3>
        <div class="py-4 space-y-2">
          <p><strong>Description:</strong> <span id="modalDesc"></span></p>
          <p><strong>Status:</strong> <span id="modalStatus"></span></p>
          <p><strong>Priority:</strong> <span id="modalPriority"></span></p>
          <p><strong>Labels:</strong> <span id="modalLabels"></span></p>
          <p><strong>Author:</strong> <span id="modalAuthor"></span></p>
          <p><strong>Created:</strong> <span id="modalCreated"></span></p>
        </div>
        <div class="modal-action">
          <button class="btn" onclick="issueModal.close()">Close</button>
        </div>
      </div>
    </dialog>
  </div>

  <script src="script.js"></script>
</body>
</html>
